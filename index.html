<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budżet domowy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Budżet domowy</h1>

  <div class="summary">
    <div>Przychody: <span id="income">0 zł</span></div>
    <div>Wydatki: <span id="expenses">0 zł</span></div>
    <div>Bilans: <span id="balance">0 zł</span></div>
  </div>

  <div class="forms">
    <form id="incomeForm" class="budget-form income-form">
      <h2>Przychód</h2>

      <input type="text" name="description" placeholder="Opis przychodu" required>
      <input type="number" name="amount" placeholder="Kwota przychodu" min="0.01" step="0.01" required>

      <select name="category">
        <option>Wynagrodzenie</option>
        <option>Premia</option>
        <option>Sprzedaż</option>
        <option>Inne</option>
      </select>

      <button type="submit">Dodaj przychód</button>
    </form>

    <form id="expenseForm" class="budget-form expense-form">
      <h2>Wydatek</h2>

      <input type="text" name="description" placeholder="Opis wydatku" required>
      <input type="number" name="amount" placeholder="Kwota wydatku" min="0.01" step="0.01" required>

      <select name="category">
        <option>Jedzenie</option>
        <option>Mieszkanie</option>
        <option>Transport</option>
        <option>Rozrywka</option>
        <option>Inne</option>
      </select>

      <button type="submit">Dodaj wydatek</button>
    </form>
  </div>

  <div id="transactions"></div>
</div>

<script src="script.js"></script>
</body>
</html>
